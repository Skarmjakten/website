
{{ $y := (.Get 0) }}
{{ $year := printf "%s%s" "stat" $y }}
{{ $stats := (index $.Site.Data.stats $year) }}
{{ $program := (index $.Site.Data.program $y) }}

<div class="stats-summary">
  <p><strong>{{ i18n "starter" }} {{ $y }}:</strong> {{ $stats.totalStarts }}</p>
</div>

<h4>{{ i18n "runner" }} per bana</h4>
<canvas id="runners" style="max-height:300px;"></canvas>
<script>
  (function() {
    var courseColors = {
      'A': 'rgba(220, 53, 69, 0.75)',
      'B': 'rgba(253, 126, 20, 0.75)',
      'C': 'rgba(40, 167, 69, 0.75)',
      'D': 'rgba(0, 123, 255, 0.75)',
      'E': 'rgba(111, 66, 193, 0.75)',
      'F': 'rgba(108, 117, 125, 0.75)',
      'G': 'rgba(23, 162, 184, 0.75)',
      'H': 'rgba(255, 193, 7, 0.75)'
    };
    var courseLabels = [{{ range $stats.courses }}"{{ .name }}",{{ end }}];
    var courseData = [{{ range $stats.courses }}{{ .starts }},{{ end }}];
    var courseBg = courseLabels.map(function(l) {
      return courseColors[l] || 'rgba(173, 181, 189, 0.75)';
    });
    new Chart(document.getElementById('runners'), {
      type: 'horizontalBar',
      data: {
        labels: courseLabels,
        datasets: [{
          label: '{{ i18n "runner" }}',
          data: courseData,
          backgroundColor: courseBg,
          borderColor: courseBg.map(function(c) { return c.replace('0.75', '1'); }),
          borderWidth: 1
        }]
      },
      options: {
        responsive: true,
        legend: { display: false },
        title: { display: false },
        scales: {
          xAxes: [{ ticks: { beginAtZero: true }, scaleLabel: { display: true, labelString: '{{ i18n "runner" }}' } }],
          yAxes: [{ ticks: { fontSize: 14 } }]
        },
        tooltips: {
          callbacks: {
            label: function(item) { return ' ' + item.xLabel + ' {{ i18n "runner" }}'; }
          }
        }
      }
    });
  })();
</script>

<h4>{{ i18n "runner" }} per deltävling</h4>
<canvas id="events" style="max-height:600px;"></canvas>
<script>
  (function() {
    var eventLabels = [{{ range $program.events }}"{{ .Plats }}",{{ end }}];
    var eventData = [{{ range $stats.events }}{{ .starts }},{{ end }}];
    var eventAvg = eventData.reduce(function(a, b) { return a + b; }, 0) / eventData.length;
    var eventBg = eventData.map(function(v) {
      return v >= eventAvg ? 'rgba(0, 123, 255, 0.65)' : 'rgba(0, 123, 255, 0.35)';
    });
    new Chart(document.getElementById('events'), {
      type: 'horizontalBar',
      data: {
        labels: eventLabels,
        datasets: [{
          label: '{{ i18n "runner" }}',
          data: eventData,
          backgroundColor: eventBg,
          borderColor: 'rgba(0, 123, 255, 0.9)',
          borderWidth: 1
        }]
      },
      options: {
        responsive: true,
        legend: { display: false },
        title: { display: false },
        scales: {
          xAxes: [{ ticks: { beginAtZero: true }, scaleLabel: { display: true, labelString: '{{ i18n "runner" }}' } }],
          yAxes: [{ ticks: { fontSize: 13 } }]
        },
        tooltips: {
          callbacks: {
            label: function(item) { return ' ' + item.xLabel + ' {{ i18n "runner" }}'; }
          }
        }
      }
    });
  })();
</script>
