# Workflow to update statistics from result files every Thursday night
name: Build statistik

on:
  # Runs every Thursday at 23:00 UTC
  schedule:
    - cron: '0 23 * * 4'

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions to allow committing updated stats back to the repo
permissions:
  contents: write

# Allow one concurrent run
concurrency:
  group: "statistik"
  cancel-in-progress: true

# Default to bash
defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install statistik CLI
        run: |
          wget -O ${{ runner.temp }}/statistik \
            https://github.com/Skarmjakten/statistik/releases/download/v0.1/statistik \
          && chmod +x ${{ runner.temp }}/statistik

      - name: Build statistik
        run: |
          YEAR=$(date +%Y)
          ${{ runner.temp }}/statistik "$YEAR"
          if [ -f result.json ]; then
            mv result.json "data/stats/stat${YEAR}.json"
            echo "Updated data/stats/stat${YEAR}.json"
          else
            echo "No result.json produced – skipping commit"
            exit 1
          fi

      - name: Commit updated stats
        run: |
          YEAR=$(date +%Y)
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "data/stats/stat${YEAR}.json"
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update statistik for ${YEAR} [skip ci]"
            git push
          fi
